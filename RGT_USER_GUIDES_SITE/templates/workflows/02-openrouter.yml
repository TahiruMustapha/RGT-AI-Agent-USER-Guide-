# TEMPLATE: OpenRouter
# ──────────────────────
# Single API key that routes to any model: Claude, GPT, Gemini, Llama, Mistral, DeepSeek, etc.
# Best choice if you want flexibility or don't want to manage multiple provider keys.
#
# SETUP:
#   1. Sign up at openrouter.ai → Keys → Create Key
#   2. Add OPENROUTER_KEY to repo secrets (Settings → Secrets → Actions)
#
# MODEL FORMAT: always "provider/model-name" — see openrouter.ai/models for full list

name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ghcr.io/madibalive/copilot-for-github:latest
        with:
          provider: openrouter
          api-key: ${{ secrets.OPENROUTER_KEY }}

          # ── Pick one model ─────────────────────────────────────
          model: anthropic/claude-sonnet-4-6    # recommended
          # model: anthropic/claude-opus-4-6    # highest quality
          # model: anthropic/claude-haiku-4-5   # fast and cheap
          # model: openai/gpt-4.1               # GPT-4.1
          # model: openai/gpt-4o                # GPT-4o
          # model: google/gemini-3-pro-preview   # Gemini 3 Pro
          # model: google/gemini-2.5-pro         # Gemini 2.5 Pro
          # model: meta-llama/llama-3.3-70b-instruct  # open source
          # model: deepseek/deepseek-r1          # strong reasoning
          # model: mistralai/devstral-medium     # code-focused
          # model: x-ai/grok-2                  # Grok 2

          reasoning: medium
