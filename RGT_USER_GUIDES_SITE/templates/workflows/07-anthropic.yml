# TEMPLATE: Anthropic Claude
# ────────────────────────────
# SETUP: Add ANTHROPIC_KEY to repo secrets

name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ghcr.io/madibalive/copilot-for-github:latest
        with:
          provider: anthropic       # alias: claude
          api-key: ${{ secrets.ANTHROPIC_KEY }}
          model: claude-sonnet-4-6  # or claude-opus-4-6 for best quality
          reasoning: medium
