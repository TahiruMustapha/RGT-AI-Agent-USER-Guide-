# TEMPLATE: Nightly Docs Maintenance
# ─────────────────────────────────────
# Runs every night and checks if your README and docs are out of sync
# with recent code changes. If drift is found, opens a PR with fixes.
#
# SETUP:
#   1. Add GEMINI_API_KEY to repo secrets
#   2. Save as .github/workflows/nightly-docs.yml
#   3. Add the docs-drift command to your .reviewerc (see templates/reviewerc/nightly-docs.reviewerc)
#
# IMPORTANT: The job name here ("nightly-docs") must match the key in
#            schedule.runs in your .reviewerc file.

name: Nightly Docs Check

on:
  schedule:
    - cron: "0 2 * * *"     # 2am UTC every night — adjust to your timezone
  workflow_dispatch:          # allows manual trigger from Actions tab

permissions:
  contents: write             # needed to commit changes and open PRs
  pull-requests: write

jobs:
  nightly-docs:               # ← this name must match schedule.runs key in .reviewerc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # required — bot needs full git history to detect drift
      - uses: ghcr.io/madibalive/copilot-for-github:latest
        with:
          provider: google
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: gemini-3-pro-preview
