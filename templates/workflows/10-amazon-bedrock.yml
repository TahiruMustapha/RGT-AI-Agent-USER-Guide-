# TEMPLATE: Amazon Bedrock
# ──────────────────────────
# SETUP:
#   Add these to repo secrets:
#     AWS_ACCESS_KEY_ID     — IAM access key with bedrock:InvokeModelWithResponseStream
#     AWS_SECRET_ACCESS_KEY — IAM secret key
#     AWS_REGION            — e.g. us-east-1
#
# No api-key input needed — uses AWS credentials from env.

name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ghcr.io/madibalive/copilot-for-github:latest
        with:
          provider: amazon-bedrock
          model: amazon.nova-pro-v1:0   # or amazon.nova-premier-v1:0 for best quality
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
