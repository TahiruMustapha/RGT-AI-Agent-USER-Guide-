# TEMPLATE: Weekly Security Audit
# ──────────────────────────────────
# Runs every Monday morning and performs a security sweep of recent changes.
# Opens a PR if actionable findings are found.
#
# SETUP:
#   1. Add GEMINI_API_KEY to repo secrets
#   2. Save as .github/workflows/weekly-security.yml
#   3. Add the security-audit command to your .reviewerc (see templates/reviewerc/nightly-docs.reviewerc)
#
# IMPORTANT: The job name here ("weekly-security") must match the key in
#            schedule.runs in your .reviewerc file.

name: Weekly Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"     # 8am UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-security:            # ← must match schedule.runs key in .reviewerc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ghcr.io/madibalive/copilot-for-github:latest
        with:
          provider: google
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: gemini-3-pro-preview
          reasoning: high     # security audits benefit from deeper reasoning
